<script>
const TAB_TITLES = {
  summary: "📊 统计分析总览",
  backdoor: "🔍 系统后门排查",
  user: "👥 用户与登录检查",
  log: "📋 日志分析",
  network: "🌐 网络检查",
  process: "⚙️ 进程检查",
  filesystem: "📁 文件系统检查",
  package: "📦 软件包检查",
  persistence: "🔄 持久化检查",
  integrity: "🛡️ 系统完整性",
  malware: "🦠 恶意进程与提权点"
};

const SUB_TAB_TITLES = {
  summary: ["系统概览", "风险评估", "智能建议", "检查清单", "专业总结"],
  backdoor: ["📚 排查教程", "UID为0的非root用户", "可疑系统配置", "异常系统文件"],
  user: ["📚 排查教程", "当前用户", "所有用户", "最近登录记录", "登录失败记录"],
  log: ["📚 排查教程", "SSH攻击统计分析", "登录会话分析", "系统日志错误", "数据传输异常分析", "攻击模式识别", "IP地理位置分析", "安全事件时间线"],
  network: ["📚 排查教程", "监听端口", "活动连接", "网络配置", "路由表", "可疑连接"],
  process: ["📚 排查教程", "高CPU占用进程", "可疑脚本进程"],
  filesystem: ["📚 排查教程", "SUID文件", "最近修改的文件"],
  package: ["📚 排查教程", "已安装的软件包"],
  persistence: ["📚 排查教程", "自启动服务", "计划任务", "SSH公钥", "启动项配置"],
  integrity: ["📚 排查教程", "关键二进制文件校验", "系统文件完整性"],
  malware: ["📚 排查教程", "可疑进程", "可疑提权点", "隐藏文件"]
};

let gTabs = Object.keys(TAB_TITLES);
let gContent = "";
let currentSearchIndex = -1;
let searchResults = [];
let analysisData = null;

// 告警结果存储
let alertResults = {
  high: [],
  medium: [],
  low: []
};

// 统计数据存储
let systemStats = {
  total_users: 0,
  uid0_users: 0,
  listening_ports: 0,
  suspicious_processes: 0,
  suid_files: 0,
  recent_files: 0,
  failed_logins: 0,
  cron_jobs: 0,
  risk_score: 0,
  risk_level: 'NORMAL'
};

function parseTextReport(text) {
  console.log("Parsing text report, length:", text.length);
  const sections = text.split("##########################################");
  console.log("Found sections:", sections.length);
  const data = {};
  let currentSection = null;
  
  for (const section of sections) {
    if (!section.trim()) continue;
    
    console.log("Processing section:", section.substring(0, 100));
    const moduleMatch = section.match(/模块: (.*?)\n/);
    if (!moduleMatch) {
      console.log("No module match found");
      continue;
    }
    
    const moduleTitle = moduleMatch[1];
    console.log("Found module:", moduleTitle);
    const moduleKey = Object.keys(TAB_TITLES).find(key => TAB_TITLES[key] === moduleTitle);
    console.log("Module key:", moduleKey);
    if (!moduleKey) continue;
    
    const subSections = section.split("------------------------------------------");
    console.log("Sub-sections for", moduleKey, ":", subSections.length);
    data[moduleKey] = {};
    
    for (let i = 1; i < subSections.length; i += 2) {
      const titleMatch = subSections[i].match(/子项: (.*?)\n/);
      if (!titleMatch) continue;
      const title = titleMatch[1];
      const content = subSections[i + 1] ? subSections[i + 1].trim() : "";
      console.log("Adding sub-item:", title, "content length:", content.length);
      data[moduleKey][title] = content;
    }
  }
  
  console.log("Final parsed data:", data);
  return data;
}

// 生成统计分析
function generateStatistics(data) {
  const stats = {
    system_overview: {},
    security_summary: {},
    risk_assessment: {},
    recommendations: []
  };
  
  // 重置统计数据
  systemStats = {
    total_users: 0,
    uid0_users: 0,
    listening_ports: 0,
    suspicious_processes: 0,
    suid_files: 0,
    recent_files: 0,
    failed_logins: 0,
    cron_jobs: 0,
    risk_score: 0,
    risk_level: 'NORMAL'
  };
  
  // 用户统计
  if (data.user && data.user['所有用户']) {
    const users = data.user['所有用户'].split('\n').filter(u => u.trim());
    systemStats.total_users = users.length;
  }
  
  if (data.backdoor && data.backdoor['UID为0的非root用户']) {
    const uid0Content = data.backdoor['UID为0的非root用户'];
    systemStats.uid0_users = (uid0Content.match(/可疑UID 0用户/g) || []).length;
  }
  
  // 网络统计
  if (data.network && data.network['监听端口']) {
    const ports = data.network['监听端口'];
    systemStats.listening_ports = (ports.match(/LISTEN|:/g) || []).length;
  }
  
  // 进程统计
  if (data.process && data.process['可疑脚本进程']) {
    const processes = data.process['可疑脚本进程'].split('\n').filter(p => p.trim());
    systemStats.suspicious_processes = processes.length;
  }
  
  // 文件系统统计
  if (data.filesystem && data.filesystem['SUID文件']) {
    const suidFiles = data.filesystem['SUID文件'];
    systemStats.suid_files = (suidFiles.match(/-rws/g) || []).length;
  }
  
  if (data.filesystem && data.filesystem['最近修改的文件']) {
    const recentFiles = data.filesystem['最近修改的文件'].split('\n').filter(f => f.trim());
    systemStats.recent_files = recentFiles.length;
  }
  
  // 登录失败统计
  if (data.user && data.user['登录失败记录']) {
    const failedLogins = data.user['登录失败记录'];
    systemStats.failed_logins = (failedLogins.match(/Failed password/g) || []).length;
  }
  
  // 计划任务统计
  if (data.persistence && data.persistence['计划任务']) {
    const cronJobs = data.persistence['计划任务'];
    systemStats.cron_jobs = (cronJobs.match(/crontab|cron|\*/g) || []).length;
  }
  
  // 风险评分计算
  let riskScore = 0;
  const recommendations = [];
  
  if (systemStats.uid0_users > 0) {
    riskScore += 50;
    recommendations.push({
      level: 'high',
      title: '发现异常高权限用户',
      description: `发现 ${systemStats.uid0_users} 个非root的UID为0用户，这可能是安全威胁。`,
      action: '建议立即与运维和开发人员确认这些用户的合法性，如无法确认应立即禁用。'
    });
  } else {
    recommendations.push({
      level: 'info',
      title: '用户权限检查正常',
      description: `系统共有 ${systemStats.total_users} 个用户账户，除root外未发现其他UID为0的高权限用户，这是良好的安全实践。`,
      action: '建议定期审查用户账户，确保权限分配合理。'
    });
  }
  
  if (systemStats.suspicious_processes > 10) {
    riskScore += 30;
    recommendations.push({
      level: 'medium',
      title: '可疑进程数量异常',
      description: `发现 ${systemStats.suspicious_processes} 个可疑脚本进程，数量较多。`,
      action: '建议检查这些进程的合法性，确认其业务必要性。'
    });
  } else if (systemStats.suspicious_processes > 0) {
    recommendations.push({
      level: 'low',
      title: '发现少量可疑进程',
      description: `发现 ${systemStats.suspicious_processes} 个可疑脚本进程。`,
      action: '建议确认这些进程的业务必要性。'
    });
  }
  
  if (systemStats.suid_files > 100) {
    riskScore += 20;
    recommendations.push({
      level: 'medium',
      title: 'SUID文件数量异常',
      description: `发现 ${systemStats.suid_files} 个SUID文件，数量较多。`,
      action: '建议审查SUID文件列表，确认是否存在异常的提权文件。'
    });
  }
  
  if (systemStats.failed_logins > 50) {
    riskScore += 25;
    recommendations.push({
      level: 'medium',
      title: '登录失败次数异常',
      description: `登录失败次数(${systemStats.failed_logins})较多，可能存在暴力破解攻击。`,
      action: '建议检查登录日志，加强密码策略和访问控制。'
    });
  }
  
  if (systemStats.listening_ports > 20) {
    riskScore += 15;
    recommendations.push({
      level: 'low',
      title: '监听端口数量较多',
      description: `监听端口数量(${systemStats.listening_ports})较多。`,
      action: '建议关闭不必要的服务以减少攻击面。'
    });
  }
  
  // 确定风险等级
  if (riskScore >= 80) {
    systemStats.risk_level = 'HIGH';
  } else if (riskScore >= 40) {
    systemStats.risk_level = 'MEDIUM';
  } else if (riskScore >= 20) {
    systemStats.risk_level = 'LOW';
  } else {
    systemStats.risk_level = 'NORMAL';
  }
  
  systemStats.risk_score = riskScore;
  
  return {
    stats: systemStats,
    recommendations: recommendations
  };
}

function parseJsonReport(jsonText) {
  try {
    return JSON.parse(jsonText);
  } catch (e) {
    console.error("JSON解析失败:", e);
    return null;
  }
}

      resultDiv.innerHTML += '<br><strong style="color: green;">测试数据加载成功！</strong>';
    } else {
      resultDiv.innerHTML += '<br><strong style="color: red;">测试数据解析失败</strong>';
    }
  } catch (error) {
    resultDiv.innerHTML += '<br><strong style="color: red;">错误: ' + error.message + '</strong>';
  }
}

function loadFile() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  
  if (!file) {
    alert('请选择一个文件');
    return;
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    gContent = e.target.result;
    console.log("File loaded, content length:", gContent.length);
    console.log("First 500 chars:", gContent.substring(0, 500));
    
    if (file.name.endsWith('.json')) {
      analysisData = parseJsonReport(gContent);
    } else {
      analysisData = parseTextReport(gContent);
    }
    
    console.log("Analysis data:", analysisData);
    
    if (analysisData && Object.keys(analysisData).length > 0) {
      const analysis = generateStatistics(analysisData);
      generateAlerts(analysisData);
      updateAlertPanel();
      generateTabs();
      openTab(null, gTabs[0]);
    } else {
      alert('文件格式不正确或解析失败');
    }
  };
  
  reader.readAsText(file);
}

function generateAlerts(data) {
  alertResults = { high: [], medium: [], low: [] };
  
  // 检查UID为0的用户
  if (data.backdoor && data.backdoor['UID为0的非root用户']) {
    const uid0Content = data.backdoor['UID为0的非root用户'];
    if (uid0Content.includes('可疑') || uid0Content.includes('异常')) {
      alertResults.high.push({
        title: '发现可疑UID为0用户',
        description: '系统中存在非root的UID为0用户，可能是后门账户',
        location: 'backdoor',
        subTab: 'UID为0的非root用户'
      });
    }
  }
  
  // 检查可疑进程
  if (data.process && data.process['可疑脚本进程']) {
    const processes = data.process['可疑脚本进程'].split('\n').filter(p => p.trim());
    if (processes.length > 10) {
      alertResults.medium.push({
        title: '可疑进程数量异常',
        description: `发现${processes.length}个可疑脚本进程`,
        location: 'process',
        subTab: '可疑脚本进程'
      });
    } else if (processes.length > 0) {
      alertResults.low.push({
        title: '发现可疑进程',
        description: `发现${processes.length}个可疑脚本进程`,
        location: 'process',
        subTab: '可疑脚本进程'
      });
    }
  }
  
  // 检查登录失败
  if (data.user && data.user['登录失败记录']) {
    const failedLogins = data.user['登录失败记录'];
    const failCount = (failedLogins.match(/Failed password/g) || []).length;
    if (failCount > 50) {
      alertResults.medium.push({
        title: '登录失败次数异常',
        description: `检测到${failCount}次登录失败，可能存在暴力破解攻击`,
        location: 'user',
        subTab: '登录失败记录'
      });
    }
  }
  
  // 检查SUID文件
  if (data.filesystem && data.filesystem['SUID文件']) {
    const suidFiles = data.filesystem['SUID文件'];
    const suidCount = (suidFiles.match(/-rws/g) || []).length;
    if (suidCount > 100) {
      alertResults.medium.push({
        title: 'SUID文件数量异常',
        description: `发现${suidCount}个SUID文件，数量较多`,
        location: 'filesystem',
        subTab: 'SUID文件'
      });
    }
  }
}

function updateAlertPanel() {

  });
  
  alertResults.low.forEach(alert => {

  if (alertHtml === '') {

}

function jumpToAlert(tabName, subTabName) {

function generateTabs() {

function openTab(evt, tabName) {
  const tabcontent = document.getElementsByClassName("tabcontent");
  for (let i = 0; i < tabcontent.length; i++) {
    tabcontent[i].style.display = "none";
  }
  
  const tablinks = document.getElementsByClassName("tablinks");
  for (let i = 0; i < tablinks.length; i++) {
    tablinks[i].className = tablinks[i].className.replace(" active", "");
  }
  
  const targetTab = document.getElementById(tabName);
  if (targetTab) {
    targetTab.style.display = "block";
  }
  
  if (evt && evt.currentTarget) {
    evt.currentTarget.className += " active";
  } else {
    // 如果没有事件对象，找到对应的按钮并激活
    const targetButton = Array.from(tablinks).find(btn => btn.textContent === TAB_TITLES[tabName]);
    if (targetButton) {
      targetButton.className += " active";
    }
  }
}

function searchContent() {
  const searchTerm = document.getElementById('searchInput').value.toLowerCase();
  if (!searchTerm || !gContent) {
    clearSearch();
    return;
  }
  
  searchResults = [];
  currentSearchIndex = -1;
  
  // 清除之前的高亮
  clearSearch();
  
  // 在所有标签页内容中搜索
  const allContent = document.querySelectorAll('.tabcontent pre, .tabcontent p, .tabcontent div');
  
  allContent.forEach((element, index) => {
    const text = element.textContent || element.innerText;
    if (text.toLowerCase().includes(searchTerm)) {
      searchResults.push({
        element: element,
        index: index,
        text: text
      });
      
      // 高亮搜索结果
      const regex = new RegExp(`(${searchTerm})`, 'gi');
      const highlightedText = text.replace(regex, '<span class="mark">$1</span>');
      
      if (element.innerHTML !== undefined) {
        element.innerHTML = highlightedText;
      }
    }
  });
  
  updateSearchNavigation();
  
  if (searchResults.length > 0) {
    navigateSearch(1);
  }
}

function navigateSearch(direction) {
  if (searchResults.length === 0) return;
  
  // 清除当前高亮
  if (currentSearchIndex >= 0 && currentSearchIndex < searchResults.length) {
    const currentElement = searchResults[currentSearchIndex].element;
    const marks = currentElement.querySelectorAll('.mark.current');
    marks.forEach(mark => mark.classList.remove('current'));
  }
  
  // 更新索引
  if (direction === 1) {
    currentSearchIndex = (currentSearchIndex + 1) % searchResults.length;
  } else {
    currentSearchIndex = currentSearchIndex <= 0 ? searchResults.length - 1 : currentSearchIndex - 1;
  }
  
  // 高亮当前结果
  const currentResult = searchResults[currentSearchIndex];
  const marks = currentResult.element.querySelectorAll('.mark');
  if (marks.length > 0) {
    marks[0].classList.add('current');
    marks[0].scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  
  updateSearchNavigation();
}

function updateSearchNavigation() {
  const prevBtn = document.querySelector('.search-nav button:first-child');
  const nextBtn = document.querySelector('.search-nav button:last-child');
  const searchInfo = document.querySelector('.search-nav span');
  
  if (searchResults.length > 0) {
    prevBtn.disabled = false;
    nextBtn.disabled = false;
    searchInfo.textContent = `${currentSearchIndex + 1}/${searchResults.length}`;
  } else {
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    searchInfo.textContent = '输入关键词搜索';
  }
}

function clearSearch() {
  // 清除所有高亮
  const marks = document.querySelectorAll('.mark');
  marks.forEach(mark => {
    const parent = mark.parentNode;
    parent.replaceChild(document.createTextNode(mark.textContent), mark);
    parent.normalize();
  });
  
  searchResults = [];
  currentSearchIndex = -1;
  updateSearchNavigation();
}

function toggleSidebar() {
  const sidebar = document.querySelector('.sidebar');
  const button = document.querySelector('.collapse-button');
  
  if (sidebar.style.display === 'none') {
    sidebar.style.display = 'flex';
    button.textContent = '收起告警面板 >';
  } else {
    sidebar.style.display = 'none';
    button.textContent = '< 展开告警面板';
  }
}

// 页面加载完成后的初始化
document.addEventListener('DOMContentLoaded', function() {
  // 初始化搜索导航按钮事件
  document.addEventListener('click', function(e) {
    if (e.target.matches('.search-nav button:first-child')) {
      navigateSearch(-1);
    } else if (e.target.matches('.search-nav button:last-child')) {
      navigateSearch(1);
    }
  });
  
  // 搜索框回车事件
  document.getElementById('searchInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      searchContent();
    }
  });
  
  // 实时搜索
  document.getElementById('searchInput').addEventListener('input', function() {
    if (this.value === '') {
      clearSearch();
    }
  });
});
